name = "insighthunter-lite"
account_id = "18c8e61a3669253dcfd0c7eec6be36a3"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "insighthunter-lite"
database_id = "0870098b-bfeb-466c-bcd5-98cc3a1b3e30"

[[r2_buckets]]
binding = "CSV_BUCKET"
bucket_name = "insighthunter-lite-uploads"
preview_bucket_name = "insighthunter-lite-uploads-preview"

[[kv_namespaces]]
binding = "SESSIONS"
id = "60e34ba310ca40c79edec05470c7a271"
preview_id = "60e34ba310ca40c79edec05470c7a271"

[ai]
binding = "AI"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "insighthunter_lite_events"

[vars]
ENVIRONMENT = "development"
AUTH_SERVICE_URL = "https://auth.insighthunter.com"
MAX_CSV_ROWS = "10000"
