{
  "name": "insight-lite-api",
  "main": "index.ts",
  "compatibility_date": "2025-03-07",
  "compatibility_flags": ["nodejs_compat"],
  "observability": {
    "enabled": true,
    "head_sampling_rate": 1
  },
  "d1_databases": [
    {
      "binding": "DB",
      "database_name": "insight-hunter-db",
      "database_id": "<YOUR_D1_DATABASE_ID>"
    }
  ],
  "kv_namespaces": [
    {
      "binding": "SESSIONS",
      "id": "<YOUR_KV_NAMESPACE_ID>",
      "preview_id": "<YOUR_KV_PREVIEW_ID>"
    }
  ],
  "r2_buckets": [
    {
      "binding": "REPORT_BUCKET",
      "bucket_name": "insight-reports"
    }
  ],
  "analytics_engine_datasets": [
    {
      "binding": "ANALYTICS",
      "dataset": "insight_hunter_events"
    }
  ],
  "vars": {
    "ALLOWED_ORIGIN": "https://insight.hunterturner.com"
  }
  // INTERNAL_API_SECRET → set via: wrangler secret put INTERNAL_API_SECRET
}
name = "insighthunter-lite"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "IH_SESSIONS"
id = "88a8b6dd2b464effa9025e3f0020cc5e"
preview_id = "88a8b6dd2b464effa9025e3f0020cc5e"

[[kv_namespaces]]
binding = "IH_CACHE"
id = "b3623f7961cb4d9cbc190bc8ef981b3a"
preview_id = "b3623f7961cb4d9cbc190bc8ef981b3a"

[[services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"

[vars]
APP_ENV = "development"
APP_URL = "http://localhost:4321"
APP_TIER = "lite"
SESSION_EXPIRY = "604800"

# Secrets — add via: wrangler secret put SECRET_NAME
# Required: JWT_SECRET, QBO_CLIENT_ID, QBO_CLIENT_SECRET, QBO_REDIRECT_URI
