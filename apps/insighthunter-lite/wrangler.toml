
{
  "name": "insighthunter-lite",
  "account_id": "18c8e61a3669253dcfd0c7eec6be36a3",
  "main": "dist/_worker.js",
  "compatibility_date": "2025-03-07",
  "compatibility_flags": ["nodejs_compat"],
  "observability": { "enabled": true, "head_sampling_rate": 1 },

  // Static assets served by the Worker
  "assets": {
    "directory": "./dist",
    "binding": "ASSETS",
    "not_found_handling": "single-page-application"
  },

  // Relational data: uploads, transactions, reports
  "d1_databases": [
    {
      "binding": "DB",
      "database_name": "insighthunter-lite",
      "database_id": "YOUR_D1_DATABASE_ID"
    }
  ],

  // Raw CSV file storage
  "r2_buckets": [
    {
      "binding": "CSV_BUCKET",
      "bucket_name": "insighthunter-lite-uploads",
      "preview_bucket_name": "insighthunter-lite-uploads-preview"
    }
  ],

  // Session tokens written by insighthunter-auth
  "kv_namespaces": [
    {
      "binding": "SESSIONS",
      "id": "YOUR_KV_NAMESPACE_ID",
      "preview_id": "YOUR_KV_PREVIEW_ID"
    }
  ],

  // Workers AI for P&L summaries + cash flow insights
  "ai": { "binding": "AI" },

  // Analytics Engine for upload/report events
  "analytics_engine_datasets": [
    { "binding": "ANALYTICS", "dataset": "insighthunter_lite_events" }
  ],

  "vars": {
    "ENVIRONMENT": "development",
    "AUTH_SERVICE_URL": "https://auth.insighthunter.com",
    "MAX_CSV_ROWS": "10000"
  }
}
