name = "insighthunter-bookkeeping"
main = "apps/insighthunter-bookkeeping/src/backend/index.ts"
compatibility_date = "2026-02-26"
compatibility_flags = ["nodejs_compat"]

[[queues.producers]]
binding = "TODO_QUEUE"
queue = "bookkeeping-todos"

[[queues.consumers]]
queue = "bookkeeping-todos"
max_batch_size = 10
max_wait_time_ms = 5000

# Durable Objects for holding state
[[durable_objects.bindings]]
name = "LEDGER"
class_name = "BookkeepingLedger"

[[durable_objects.bindings]]
name = "INVOICES"
class_name = "InvoiceManager"

[[durable_objects.bindings]]
name = "BANK_CONNECTION"
class_name = "BankConnectionManager"

[[durable_objects.bindings]]
name = "SUBSCRIPTIONS"
class_name = "SubscriptionManager"

# D1 Database for relational data (users, accounts, etc)
[[d1_databases]]
binding = "DB"
database_name = "insighthunter-bookkeeping"
database_id = "c1b333a5-e87a-426d-92a0-49658231c6a6"

# KV for caching
[[kv_namespaces]]
binding = "CACHE"
id = "a6b8254f3a734a1288c4b910b82f7d5d"
preview_id = "a6b8254f3a734a1288c4b910b82f7d5d"


# Environment Variables
[vars]
PLAID_CLIENT_ID = "your-plaid-client-id"
PLAID_SECRET = "your-plaid-secret"

# Dev Environment
[env.dev.vars]
PLAID_ENV = "sandbox"

[[services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"

[[services]]
binding = "AGENTS_WORKER"
service = "insighthunter-agents"
