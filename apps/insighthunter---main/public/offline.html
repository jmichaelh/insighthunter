<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — InsightHunter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family:     system-ui, sans-serif;
      background:      #f7f3ee;
      color:           #2c1f0e;
      display:         flex;
      align-items:     center;
      justify-content: center;
      min-height:      100vh;
      padding:         2rem;
      text-align:      center;
    }
    .card {
      background:    #fff;
      border:        1px solid #e8ddd0;
      border-radius: 16px;
      padding:       3rem 2.5rem;
      max-width:     440px;
      width:         100%;
      box-shadow:    0 4px 24px rgba(0,0,0,0.08);
    }
    .icon  { font-size: 3.5rem; margin-bottom: 1.25rem; }
    h1     { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.75rem; }
    p      { font-size: 0.95rem; color: #7a6652; line-height: 1.7; margin-bottom: 1.5rem; }
    button {
      padding:       12px 28px;
      background:    #9b8a72;
      color:         #fff;
      border:        none;
      border-radius: 8px;
      font-size:     0.95rem;
      font-weight:   600;
      cursor:        pointer;
    }
    button:hover { background: #7a6652; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>
      InsightHunter needs a connection to load fresh data.
      Your queued actions will sync automatically when you reconnect.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
