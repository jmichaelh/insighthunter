# apps/insighthunter-main/wrangler.toml
# Merged: current config + insighthunter-main additions
# Last updated: 2026-03-06

name                = "insighthunter-main"
main                = "./src/index.ts"
compatibility_date  = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false

# ─── Routes ──────────────────────────────────────────────────────────────────
# custom_domain = true → Cloudflare manages SSL + routing automatically
# www redirect is handled in src/index.ts worker code (301 → apex)
routes = [
  { pattern = "insighthunter.app",     custom_domain = true },
  { pattern = "www.insighthunter.app", custom_domain = true }
]

# ─── Static Assets ───────────────────────────────────────────────────────────
# Worker handles 404s + trailing slash manually in src/index.ts
# run_worker_first intercepts /api/* before asset lookup
[assets]
directory           = "./dist"
binding             = "ASSETS"
not_found_handling  = "none"
html_handling       = "none"
run_worker_first    = ["/api/*"]

# ─── Service Bindings ─────────────────────────────────────────────────────────
[[services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"

[[services]]
binding = "AGENTS_WORKER"
service = "insighthunter-agents"

# ─── Workers AI ──────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── Vectorize ───────────────────────────────────────────────────────────────
[[vectorize]]
binding    = "VECTORIZE"
index_name = "insighthunter-embeddings"

# ─── CFO Agent (Durable Object) ──────────────────────────────────────────────
# Uses SQLite via this.sql — must be new_sqlite_classes (not new_classes)
[durable_objects]
bindings = [
  { name = "CFO_AGENT", class_name = "CfoAgent" }
]

[[migrations]]
tag                 = "v1"
new_sqlite_classes  = ["CfoAgent"]   # ← was new_classes — corrected for this.sql support

# ─── D1 Database ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "USERS"
database_name = "insight-users"
database_id   = "97eb1afb-543e-44d4-b465-a3859742aeba"

# ─── KV Namespaces ───────────────────────────────────────────────────────────
# CACHE — session validation reads + dashboard data cache
[[kv_namespaces]]
binding    = "CACHE"
id         = "af7391791e95423b82c1cd877c0992e3"
preview_id = "af7391791e95423b82c1cd877c0992e3"

# ─── Analytics Engine ────────────────────────────────────────────────────────
# Page views, funnel events, plan upgrade tracking
[[analytics_engine_datasets]]
binding = "EVENTS"
dataset = "insighthunter_events"

# ─── Observability ───────────────────────────────────────────────────────────
[observability]
enabled            = true
head_sampling_rate = 1

# ─── Vars (non-secret production defaults) ───────────────────────────────────
# Secrets → npx wrangler secret put <NAME>  (from apps/insighthunter-main/)
#   JWT_SECRET
#   STRIPE_SECRET_KEY
#   STRIPE_PRICE_STANDARD
#   STRIPE_PRICE_PRO
#   LEMON_SQUEEZY_WEBHOOK_SECRET
[vars]
ENVIRONMENT  = "production"
APP_VERSION  = "1.0.0"
AUTH_API_URL = "https://auth.insighthunter.app"
SITE_URL     = "https://insighthunter.app"

# ─── Staging Environment ─────────────────────────────────────────────────────
[env.staging]
name               = "insighthunter-staging"
compatibility_date = "2025-04-01"
workers_dev        = true

[env.staging.durable_objects]
bindings = [
  { name = "CFO_AGENT", class_name = "CfoAgent" }
]

[[env.staging.migrations]]
tag                = "v1"
new_sqlite_classes = ["CfoAgent"]

[[env.staging.vectorize]]
binding    = "VECTORIZE"
index_name = "insighthunter-embeddings-staging"

[[env.staging.d1_databases]]
binding       = "USERS"
database_name = "insight-users-staging"
database_id   = "97eb1afb-543e-44d4-b465-a3859742aeba"

[[env.staging.kv_namespaces]]
binding    = "CACHE"
id         = "af7391791e95423b82c1cd877c0992e3"
preview_id = "af7391791e95423b82c1cd877c0992e3"

[[env.staging.analytics_engine_datasets]]
binding = "EVENTS"
dataset = "insighthunter_events_staging"

[[env.staging.services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"

[[env.staging.services]]
binding = "AGENTS_WORKER"
service = "insighthunter-agents"

[env.staging.vars]
ENVIRONMENT  = "staging"
APP_VERSION  = "1.0.0"
AUTH_API_URL = "https://auth-staging.insighthunter.app"
SITE_URL     = "https://staging.insighthunter.app"

# ─── Dev Environment ─────────────────────────────────────────────────────────
[env.dev]
name               = "insighthunter-dev"
compatibility_date = "2025-04-01"
workers_dev        = true

[env.dev.durable_objects]
bindings = [
  { name = "CFO_AGENT", class_name = "CfoAgent" }
]

[[env.dev.migrations]]
tag                = "v1"
new_sqlite_classes = ["CfoAgent"]

[[env.dev.d1_databases]]
binding       = "USERS"
database_name = "insight-users-staging"
database_id   = "97eb1afb-543e-44d4-b465-a3859742aeba"

[[env.dev.kv_namespaces]]
binding    = "CACHE"
id         = "af7391791e95423b82c1cd877c0992e3"
preview_id = "af7391791e95423b82c1cd877c0992e3"

[[env.dev.analytics_engine_datasets]]
binding = "EVENTS"
dataset = "insighthunter_events_dev"

[[env.dev.services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"

[[env.dev.services]]
binding = "AGENTS_WORKER"
service = "insighthunter-agents"

[env.dev.vars]
ENVIRONMENT  = "dev"
APP_VERSION  = "1.0.0"
AUTH_API_URL = "http://localhost:8787"
SITE_URL     = "http://localhost:8787"
