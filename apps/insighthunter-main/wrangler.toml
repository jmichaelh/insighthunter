# apps/insighthunter-main/wrangler.toml
# ════════════════════════════════════════════════════════════════════════
# Main Worker: Hono API + Astro/Svelte SPA via ASSETS
# ════════════════════════════════════════════════════════════════════════

name = "insighthunter-main"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

# Astro/Svelte SPA build output (served via env.ASSETS.fetch())
[assets]
directory = "./dist" # Assuming 'astro build' outputs to 'dist'
binding = "ASSETS"

# ════════════════════════════════════════════════════════════════════════
# Development Environment (Default)
# ════════════════════════════════════════════════════════════════════════

[vars]
PUBLIC_APP_URL = "http://localhost:4321" # Default Astro dev port
PUBLIC_ENV = "development"
CORS_ORIGINS = "http://localhost:4321,https://insighthunter.app"

[[d1_databases]]
binding = "DB"
database_name = "insighthunter_main_dev"
database_id = "<DEV_D1_ID>"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "<DEV_KV_SESSIONS_ID>"
preview_id = "<DEV_KV_SESSIONS_ID>"

[[services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"

[[services]]
binding = "BOOKKEEPING_WORKER"
service = "insighthunter-bookkeeping"

[[services]]
binding = "AGENTS_WORKER"
service = "insighthunter-agents"

[[services]]
binding = "BIZFORMA_WORKER"
service = "insighthunter-bizforma"

[[services]]
binding = "LITE_WORKER"
service = "insighthunter-lite"


# ════════════════════════════════════════════════════════════════════════
# Staging Environment
# ════════════════════════════════════════════════════════════════════════
[env.staging]
[env.staging.vars]
PUBLIC_APP_URL = "https://staging.insighthunter.app"
PUBLIC_ENV = "staging"
CORS_ORIGINS = "https://staging.insighthunter.app"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "insighthunter_main_staging"
database_id = "<STAGING_D1_ID>"

[[env.staging.kv_namespaces]]
binding = "KV_SESSIONS"
id = "<STAGING_KV_SESSIONS_ID>"
preview_id = "<STAGING_KV_SESSIONS_ID>"

# Bind to staging services
[[env.staging.services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"
environment = "staging"

# ... add other staging service bindings if they exist

# ════════════════════════════════════════════════════════════════════════
# Production Environment
# ════════════════════════════════════════════════════════════════════════
[env.production]
[env.production.vars]
PUBLIC_APP_URL = "https://insighthunter.app"
PUBLIC_ENV = "production"
CORS_ORIGINS = "https://insighthunter.app"

[[env.production.d1_databases]]
binding = "DB"
database_name = "insighthunter_main_prod"
database_id = "<PROD_D1_ID>"

[[env.production.kv_namespaces]]
binding = "KV_SESSIONS"
id = "<PROD_KV_SESSIONS_ID>"
preview_id = "<PROD_KV_SESSIONS_ID>"

# Bind to production services
[[env.production.services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"
environment = "production"

[[env.production.services]]
binding = "BOOKKEEPING_WORKER"
service = "insighthunter-bookkeeping"
environment = "production"

[[env.production.services]]
binding = "AGENTS_WORKER"
service = "insighthunter-agents"
environment = "production"

[[env.production.services]]
binding = "BIZFORMA_WORKER"
service = "insighthunter-bizforma"
environment = "production"

[[env.production.services]]
binding = "LITE_WORKER"
service = "insighthunter-lite"
environment = "production"
