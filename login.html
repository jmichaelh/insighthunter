<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — Insight Hunter</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1117;--navy-2:#0F1929;--navy-3:#141E30;--navy-card:#161B22;--navy-border:#1E2A3A;
  --gold:#C9972B;--gold-l:#D4A843;--gold-d:#8A6820;
  --white:#FFF;--g1:#E2E8F0;--g2:#94A3B8;--g3:#64748B;--g4:#334155;
  --green:#10B981;--red:#EF4444;--blue:#3B82F6;--amber:#F59E0B}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);
  min-height:100vh;display:flex;flex-direction:column;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(201,151,43,.06),transparent 70%),var(--navy)}
a{color:inherit;text-decoration:none}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:5rem 1.5rem 3rem}
.auth-card{width:100%;max-width:440px;background:var(--navy-card);border:1px solid var(--navy-border);border-radius:18px;padding:2.5rem}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-bottom:2rem;text-align:center}
.auth-logo h1{font-size:1.25rem;font-weight:800;letter-spacing:-.02em}
.auth-logo p{font-size:.8rem;color:var(--g3)}
.fg{margin-bottom:1.1rem}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--g2);margin-bottom:.4rem;letter-spacing:.03em}
.fg input{width:100%;padding:.7rem 1rem;border-radius:9px;font-size:.9rem;background:var(--navy-3);
  border:1px solid var(--navy-border);color:var(--white);font-family:'Inter',sans-serif;transition:border-color .2s;outline:none}
.fg input:focus{border-color:var(--gold-d)}
.auth-submit{width:100%;padding:.8rem;border-radius:9px;background:var(--gold);color:var(--navy);
  font-size:.95rem;font-weight:700;border:none;cursor:pointer;margin-top:.5rem;
  transition:background .2s,opacity .2s;box-shadow:0 4px 20px rgba(201,151,43,.25);
  display:flex;align-items:center;justify-content:center;gap:.5rem}
.auth-submit:hover:not(:disabled){background:var(--gold-l)}
.auth-submit:disabled{opacity:.6;cursor:not-allowed}
.auth-link{text-align:center;font-size:.82rem;color:var(--g3);margin-top:1.25rem}
.auth-link a{color:var(--gold-l);font-weight:600}
.msg{padding:.75rem 1rem;border-radius:8px;font-size:.82rem;margin-bottom:1rem;display:none}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#FCA5A5;display:block}
.msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6EE7B7;display:block}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;
  justify-content:space-between;padding:0 2rem;height:64px;
  background:rgba(13,17,23,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--navy-border)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="/" style="display:flex;align-items:center;gap:8px"><svg width="30" height="30" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#141E30"/><path d="M16 4v5M13 6h6" stroke="#C9972B" stroke-width="1.5" stroke-linecap="round"/><path d="M10 9v15h12V9" stroke="#C9972B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 24h18" stroke="#C9972B" stroke-width="1.5" stroke-linecap="round"/><path d="M13 14l2.5 3L20 12" stroke="#C9972B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="font-size:.95rem;font-weight:700">Insight Hunter</span></a>
  <a href="/pricing.html" style="font-size:.82rem;color:var(--g3)">View Pricing</a>
</nav>
<div class="auth-wrap"><div class="auth-card">
<div class="auth-logo"><svg width="30" height="30" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#141E30"/><path d="M16 4v5M13 6h6" stroke="#C9972B" stroke-width="1.5" stroke-linecap="round"/><path d="M10 9v15h12V9" stroke="#C9972B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 24h18" stroke="#C9972B" stroke-width="1.5" stroke-linecap="round"/><path d="M13 14l2.5 3L20 12" stroke="#C9972B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><h1>Welcome back</h1><p>Sign in to your Insight Hunter account</p></div>
<div id="msg" class="msg"></div>
<form id="loginForm">
  <div class="fg"><label>Email</label><input id="email" type="email" placeholder="you@company.com" required autocomplete="email"/></div>
  <div class="fg">
    <label>Password <a href="/auth/forgot-password.html" style="float:right;color:var(--gold-l);font-size:.75rem;font-weight:600">Forgot password?</a></label>
    <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password"/>
  </div>
  <button type="submit" class="auth-submit" id="btn"><span id="btn-text">Sign In</span><svg id="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/><path d="M21 12a9 9 0 00-9-9"/></svg></button>
</form>
<div class="auth-link">No account? <a href="/auth/register.html">Create one free</a></div>
</div></div>
<script>const API='/api'
document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault()
  const btn=document.getElementById('btn'),msg=document.getElementById('msg')
  btn.disabled=true;document.getElementById('btn-text').textContent='Signing in...';document.getElementById('spinner').style.display='block';msg.className='msg'
  try{
    const res=await fetch(API+'/auth/login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value.trim(),password:document.getElementById('password').value})})
    const data=await res.json()
    if(!res.ok)throw new Error(data.error||'Login failed.')
    sessionStorage.setItem('ih_user',JSON.stringify(data.user))
    const redir=new URLSearchParams(location.search).get('redirect')
    window.location.href=redir||'/dashboard/index.html'
  }catch(err){
    msg.textContent=err.message;msg.className='msg error'
    btn.disabled=false;document.getElementById('btn-text').textContent='Sign In';document.getElementById('spinner').style.display='none'
  }
})</script>
</body>
</html>
