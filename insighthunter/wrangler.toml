name = "insighthunter-main"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[observability]
enabled = true
head_sampling_rate = 1

# ── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "INSIGHTHUNTER_DB"
database_name = "insighthunter-db"
database_id = "YOUR_D1_DATABASE_ID"   # replace after: wrangler d1 create insighthunter-db

# ── KV Namespace ──────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "INSIGHTHUNTER_KV"
id = "YOUR_KV_NAMESPACE_ID"           # replace after: wrangler kv namespace create insighthunter-kv

# ── Environment Variables (non-secret) ────────────────────────────────────────
[vars]
APP_URL = "https://insighthunter.com"
STRIPE_PUBLISHABLE_KEY = "pk_live_REPLACE_ME"

# ── Secrets (never put values here — use wrangler secret put) ─────────────────
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put SESSION_SECRET
