name = "insighthunter-main"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[observability]
enabled = true
head_sampling_rate = 1

# ── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "INSIGHTHUNTER_DB"
database_name = "insighthunter_db"
database_id = "aa2b9aa2-f1dd-4fdc-b4b0-d9b4bdc2ea57"   # replace after: wrangler d1 create insighthunter-db

# ── KV Namespace ──────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "INSIGHTHUNTER_KV"
id = "e412ddb53db24e10bb59735e62732bf0"
6
# ── Environment Variables (non-secret) ────────────────────────────────────────
[vars]
APP_URL = "https://insighthunter.app"
STRIPE_PUBLISHABLE_KEY = "pk_live_REPLACE_ME"

# ── Secrets (never put values here — use wrangler secret put) ─────────────────
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put SESSION_SECRET
