# /insighthunter/wrangler.toml — used for: wrangler dev (run from inside insighthunter/)
name = "insighthunter"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = false

routes = [
  { pattern = "insighthunter.app", custom_domain = true },
  { pattern = "www.insighthunter.app", custom_domain = true }
]

# ─── Static Assets (inherited by all envs) ───────────────────────────────────
[assets]
directory = "dist"
binding = "ASSETS"                      # fixed: removed stray leading apostrophe
not_found_handling = "none"
html_handling = "none"
run_worker_first = ["/api/*"]

# ─── Workers AI ──────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── Vectorize ───────────────────────────────────────────────────────────────
[[vectorize]]
binding = "VECTORIZE"
index_name = "insight-cfo-embeddings"

# ─── CFO Agent (Durable Object) ──────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "CFO_AGENT", class_name = "CfoAgent" }
]

[[migrations]]
tag = "v1"
new_classes = ["CfoAgent"]

# ─── D1 Database ─────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "USERS"
database_name = "insight-users"
database_id = "97eb1afb-543e-44d4-b465-a3859742aeba"

# ─── KV Namespace ────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "af7391791e95423b82c1cd877c0992e3"
preview_id = "af7391791e95423b82c1cd877c0992e3"

# ─── Observability ───────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ─── Vars ────────────────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
AUTH_API_URL = "https://auth.insighthunter.app"
SITE_URL = "https://insighthunter.app"

# ─── Staging ─────────────────────────────────────────────────────────────────
[env.staging]
name = "insighthunter-staging"
compatibility_date = "2025-04-01"
workers_dev = true

[env.staging.durable_objects]
bindings = [
  { name = "CFO_AGENT", class_name = "CfoAgent" }
]

[[env.staging.vectorize]]
binding = "VECTORIZE"
index_name = "insight-cfo-embeddings-staging"

[[env.staging.d1_databases]]
binding = "USERS"
database_name = "insight-users-staging"
database_id = "<STAGING-D1-UUID>"       # wrangler d1 create insight-users-staging

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "<STAGING-KV-ID>"                  # wrangler kv namespace create CACHE --env staging
preview_id = "<STAGING-KV-ID>"

[env.staging.vars]
ENVIRONMENT = "staging"
AUTH_API_URL = "https://auth-staging.insighthunter.app"
SITE_URL = "https://staging.insighthunter.app"

# ─── Dev ─────────────────────────────────────────────────────────────────────
[env.dev]
name = "insighthunter-dev"
compatibility_date = "2025-04-01"
workers_dev = true

[env.dev.durable_objects]
bindings = [
  { name = "CFO_AGENT", class_name = "CfoAgent" }
]

[[env.dev.vectorize]]                   # was missing in original
binding = "VECTORIZE"
index_name = "insight-cfo-embeddings-dev"

[[env.dev.d1_databases]]
binding = "USERS"
database_name = "insight-users-dev"
database_id = "<DEV-D1-UUID>"           # wrangler d1 create insight-users-dev

[[env.dev.kv_namespaces]]
binding = "CACHE"
id = "<DEV-KV-ID>"                      # wrangler kv namespace create CACHE --env dev
preview_id = "<DEV-KV-ID>"

[env.dev.vars]
ENVIRONMENT = "dev"
AUTH_API_URL = "http://localhost:8787"
SITE_URL = "http://localhost:8787"
